{{ partial "header.html" . }}

{{ .Content }}

<ul>
  {{ range (where .Site.RegularPages "Section" "posts") }}
  <li>
    <span class="date">{{ .Date.Format "2006/01/02" }}</span>
    <a href="{{ .RelPermalink }}">{{ .Title | markdownify }}</a>
  </li>
  {{ end }}
</ul>

{{ partial "footer.html" . }}
